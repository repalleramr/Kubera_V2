
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUBERA WARHUNT V3</title>
<link rel="stylesheet" href="styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1128">
</head>
<body>

<div id="app">

<header class="header">
<h1>KUBERA WARHUNT</h1>
<div class="bank">₹<span id="bank">30000</span></div>
</header>

<section class="risk">
<div class="riskbar"><div id="riskfill"></div></div>
<div id="risktext">LOW RISK</div>
</section>

<section class="keypads">
<div class="pad">
<h3>YAKSHA</h3>
<div class="grid" id="padY"></div>
</div>
<div class="pad">
<h3>KINNARA</h3>
<div class="grid" id="padK"></div>
</div>
</section>

<section class="panel">
<div>Chakra: <span id="chakra">1</span></div>
</section>

<section class="controls">
<button id="undo">Undo</button>
<button id="clear">Clear</button>
<button id="new">Prayoga</button>
</section>

<section class="settings">
<h2>YANTRA</h2>
<label>Coin Size
<select id="coin">
<option>10</option>
<option>50</option>
<option selected>100</option>
<option>500</option>
<option>1000</option>
</select>
</label>
<label>Stop Loss
<input type="number" id="stoploss" value="10000">
</label>
<label>Safety Reserve
<input type="number" id="safety" value="5000">
</label>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
